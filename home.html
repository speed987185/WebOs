<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sloth OS - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, rgb(255, 105, 180), rgb(200, 80, 150));
            font-family: "Press Start 2P", monospace;
            min-height: 100vh;
            overflow: hidden;
        }

        .desktop {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-area {
            flex: 1;
            padding: 20px;
            overflow: auto;
            position: relative;
        }

        .taskbar {
            background: rgb(100, 50, 100);
            border-top: 2px solid navy;
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .app-icon {
            background: plum;
            border: 2px solid navy;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.5rem;
            color: white;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .app-icon:hover {
            background: rgb(152, 102, 152);
        }

        .window {
            position: absolute;
            background: rgb(200, 150, 200);
            border: 2px solid navy;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            min-width: 280px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .window.active {
            z-index: 1000;
        }

        .window-header {
            background: rgb(100, 50, 100);
            color: white;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid navy;
            user-select: none;
        }

        .window-title {
            font-size: 0.5rem;
            margin: 0;
            flex: 1;
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .window-btn {
            background: plum;
            border: 1px solid navy;
            color: white;
            width: 24px;
            height: 24px;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.4rem;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-btn:hover {
            background: rgb(152, 102, 152);
        }

        .window-content {
            flex: 1;
            padding: 12px;
            overflow: auto;
            background: white;
            color: #333;
            font-size: 0.4rem;
            line-height: 1.6;
        }

        .window-content textarea {
            width: 100%;
            height: 100%;
            border: none;
            font-family: "Courier New", monospace;
            font-size: 0.4rem;
            padding: 6px;
            resize: none;
        }

        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            height: 100%;
            padding: 10px;
        }

        .calc-btn {
            background: rgb(220, 200, 220);
            border: 1px solid navy;
            font-size: 0.4rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 3px;
            font-family: inherit;
        }

        .calc-btn:hover {
            background: rgb(200, 180, 200);
        }

        .calc-display {
            grid-column: 1 / -1;
            background: white;
            border: 1px solid navy;
            padding: 8px;
            text-align: right;
            font-size: 0.5rem;
            color: #000;
        }

        .file-list {
            list-style: none;
            padding: 10px;
            margin: 0;
            font-size: 0.4rem;
        }

        .file-list li {
            padding: 6px;
            border-bottom: 1px dotted navy;
        }

        .minimized {
            display: none;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="main-area" id="mainArea"></div>
        
        <div class="taskbar">
            <button class="app-icon" onclick="openApp('notepad')">📝 Notepad</button>
            <button class="app-icon" onclick="openApp('calc')">🔢 Calc</button>
            <button class="app-icon" onclick="openApp('files')">📁 Files</button>
            <button class="app-icon" onclick="openApp('about')">❓ Abot</button>
        </div>
    </div>

    <script>
        let windowCount = 0;
        let draggedWindow = null;
        let offsetX = 0;
        let offsetY = 0;
        let xx = 0;

        function openApp(appType) {
            windowCount++;

            const window = document.createElement('div');
            window.className = 'window active';
            window.id = 'window-' + windowCount;
            window.style.left = (50 + windowCount * 30) + 'px';
            window.style.top = (50 + windowCount * 30) + 'px';
            window.style.width = '340px';
            window.style.height = '300px';

            let title = '';
            let content = '';

            if (appType === 'notepad') {
                title = 'untitled - notepad';
                content = '<textarea placeholder="start typing..."></textarea>';
                   
            } else if (appType === 'calc') {
                title = 'calculater';
                content = `<div class="calc-display" id="display">0</div>
                <button class="calc-btn" onclick="appendNum('7')">7</button>
                <button class="calc-btn" onclick="appendNum('8')">8</button>
                <button class="calc-btn" onclick="appendNum('9')">9</button>
                <button class="calc-btn" onclick="setOp('/')">÷</button>
                <button class="calc-btn" onclick="appendNum('4')">4</button>
                <button class="calc-btn" onclick="appendNum('5')">5</button>
                <button class="calc-btn" onclick="appendNum('6')">6</button>
                <button class="calc-btn" onclick="setOp('*')">×</button>
                <button class="calc-btn" onclick="appendNum('1')">1</button>
                <button class="calc-btn" onclick="appendNum('2')">2</button>
                <button class="calc-btn" onclick="appendNum('3')">3</button>
                <button class="calc-btn" onclick="setOp('-')">-</button>
                <button class="calc-btn" onclick="appendNum('0')">0</button>
                <button class="calc-btn" onclick="appendNum('.')">.</button>
                <button class="calc-btn" onclick="calculate()">=</button>
                <button class="calc-btn" onclick="clearCalc()">C</button>`;
            } else if (appType === 'files') {
                title = 'file explorer';
                content = `<ul class="file-list">
                <li>📂 Documents</li>
                <li>📂 Downloads</li>
                <li>📂 Picures</li>      #used emoji because to lazy to add images huhu
                <li>📄 readme.txt</li>
                <li>📄 notes.docx</li>
                </ul>`;
            } else if (appType === 'about') {
                title = 'about sloth os';
                content = `<div style="padding: 10px; font-size: 0.4rem; line-height: 1.8;">
                <p>🦥 Sloth OS v1.0</p>
                <p>made by you</p>
                <p>a chill operating system for chill peple</p>
                </div>`;
            }

            window.innerHTML = `
                <div class="window-header">
                    <p class="window-title">${title}</p>
                    <div class="window-controls">
                        <button class="window-btn" onclick="minimizeWindow('${window.id}')">_</button>
                        <button class="window-btn" onclick="closeWindow('${window.id}')">×</button>
                    </div>
                </div>
                <div class="window-content">${content}</div>
            `;

            document.getElementById('mainArea').appendChild(window);
            setupWindowDrag(window);
        }

        function setupWindowDrag(windowEl) {
            const header = windowEl.querySelector('.window-header');
            const mnnArea = document.getElementById('mainArea');
            
            header.addEventListener('mousedown', (e) => {
                draggedWindow = windowEl;
                const rect = windowEl.getBoundingClientRect();
                const mainRect = mnnArea.getBoundingClientRect();
                
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                
                windowEl.classList.add('active');
                
                document.addEventListener('mousemove', moveWindow);
                document.addEventListener('mouseup', stopDrag);
            });
        }

        function moveWindow(e) {
            if (!draggedWindow) return;
            
            const mnnArea = document.getElementById('mainArea');
            
            
            const mainRect = mnnArea.getBoundingClientRect();
            
            let newX = e.clientX - mainRect.left - offsetX;
            let newY = e.clientY - mainRect.top - offsetY;
            
            newX = Math.max(0, Math.min(newX, mainRect.width - draggedWindow.offsetWidth));
            newY = Math.max(0, Math.min(newY, mainRect.height - draggedWindow.offsetHeight));
            
            draggedWindow.style.left = newX + 'px';
            draggedWindow.style.top = newY + 'px';
        }

        function stopDrag() {
            document.removeEventListener('mousemove', moveWindow);
            document.removeEventListener('mouseup', stopDrag);
        }

        function closeWindow(id) {
            const windowEl = document.getElementById(id);
            if (windowEl) {
                windowEl.remove();
            }
        }

        function minimizeWindow(id) {
            const windowEl = document.getElementById(id);
     
            if (windowEl) {
                windowEl.classList.toggle('minimized');
            }
        }

        // simple calc sutff
        let calcValue = '0';
        let calcOp = null;
        let prevValue = null;

        function appendNum(num) {
            const display = document.getElementById('display');
            if (calcValue === '0') {
                calcValue = num;
            } else {
                calcValue = calcValue + num;
            }
            display.textContent = calcValue;
        }

        function setOp(op) {
            const display = document.getElementById('display');
            if (calcValue) {
                prevValue = calcValue;
                calcOp = op;
                calcValue = '';
            }
        }
        

        function calculate() {
            const display = document.getElementById('display');
            if (prevValue && calcOp && calcValue) {
                let result;
                const a = parseFloat(prevValue);
                const b = parseFloat(calcValue);
                
                if (calcOp === '+') result = a + b;
                else if (calcOp === '-') result = a - b;
                else if (calcOp === '*') result = a * b;
                else if (calcOp === '/') result = a / b;
                
                calcValue = String(result);
                display.textContent = calcValue;
                prevValue = null;
                calcOp = null;
            }
        }

        function clearCalc() {
            calcValue = '0';
            calcOp = null;
            prevValue = null;   
            const d = document.getElementById('display');
            d.textContent = '0';
        }
    </script>
</body>
</html>
